<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Casio FINAL BOSS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calculator">

  <div class="top">
    <span>CASIO</span>
    <span>fx-100MS</span>
  </div>

  <div class="screen">
    <div id="mode">DEG</div>
    <div id="history"></div>
    <input id="display" readonly>
  </div>

  <div class="buttons">

    <button onclick="clearAll()">AC</button>
    <button onclick="memClear()">MC</button>
    <button onclick="memRecall()">MR</button>
    <button onclick="memAdd()">M+</button>
    <button onclick="memSub()">M-</button>

    <button onclick="toggleMode()">MODE</button>
    <button onclick="insert('sin(')">sin</button>
    <button onclick="insert('cos(')">cos</button>
    <button onclick="insert('tan(')">tan</button>
    <button onclick="insert('log(')">log</button>

    <button onclick="insert('ln(')">ln</button>
    <button onclick="insert('sqrt(')">√</button>
    <button onclick="insert('^')">^</button>
    <button onclick="insertFraction()">a/b</button>
    <button onclick="insert('(')">(</button>

    <button onclick="insert(')')">)</button>
    <button onclick="insert('7')">7</button>
    <button onclick="insert('8')">8</button>
    <button onclick="insert('9')">9</button>
    <button onclick="insert('/')">÷</button>

    <button onclick="insert('4')">4</button>
    <button onclick="insert('5')">5</button>
    <button onclick="insert('6')">6</button>
    <button onclick="insert('*')">×</button>
    <button onclick="del()">DEL</button>

    <button onclick="insert('1')">1</button>
    <button onclick="insert('2')">2</button>
    <button onclick="insert('3')">3</button>
    <button onclick="insert('-')">−</button>
    <button onclick="insert('pi')">π</button>

    <button onclick="insert('0')" class="zero">0</button>
    <button onclick="insert('.')">.</button>
    <button onclick="insert('+')">+</button>
    <button onclick="calculate()">=</button>

    <button onclick="historyUp()">↑</button>
    <button onclick="historyDown()">↓</button>

  </div>
</div>

<script src="script.js"></script>
</body>
  </html>
